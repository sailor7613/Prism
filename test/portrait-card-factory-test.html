<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prism — Portrait Card Factory Test</title>
<!-- ═══════════════════════════════════════════════════════════════════
     MANUAL HARNESS · 2026-07-19 · verifies the portrait-card encoding
     (Photo Z-Probe grammar → prism-graphmap.js). Open with Live Server.
     Exercises: slim-orb rule (addDot 0.034 / member diamond ×0.68),
     portrait attach on both dot and member pin, the breath (idle
     0.62±0.07 → hot 0.84±0.10 — tap "attention" to heat the member
     card), boundary washes at 0.20 alpha, and clean disposal.
     window.RESULTS carries the numbers for headless assertion.
     ═══════════════════════════════════════════════════════════════ -->
<style>
  body { background:#0c0b09; color:#f5f0e8; font-family:Georgia,serif; padding:1.2rem; }
  #c { width:min(90vw,460px); aspect-ratio:1; border:1px solid rgba(245,240,232,.08); }
  #out { font:11px/1.6 monospace; opacity:.6; white-space:pre-wrap; margin-top:.8rem; }
  button { background:rgba(245,240,232,.06); border:1px solid rgba(245,240,232,.12);
    color:#f5f0e8; padding:.3rem .7rem; margin-top:.6rem; cursor:pointer; }
</style>
</head>
<body>
<h3>portrait card · factory test</h3>
<div id="c"></div>
<button id="hot">toggle attention on the member card</button>
<div id="out">running…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../src/js/prism-graphmap.js"></script>
<script>
window.RESULTS = {};
const inst = PrismGraphmap.create({
  container: document.getElementById('c'),
  mode: 'analytical',
  capabilities: { orbit:true, zInput:true, zRender:true },
});
// Schumer via the CORS-open unitedstates archive (a data URL stands in for
// the boundary washes so the harness composes even offline).
const PORTRAIT = 'https://unitedstates.github.io/images/congress/225x275/S000148.jpg';
const FALLBACK = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAEklEQVR4nGP8z8DwnwEKmBgQAAAzoQEPZzCYzgAAAABJRU5ErkJggg==';

const dotEntry = inst.addDot(0.3, 0.7, 'C', 0.2, { label:'portrait dot', portrait: PORTRAIT });
const plain    = inst.addDot(0.6, 0.4, 'A', 0, { label:'plain dot' });
const mp       = inst.addMemberPin(0.55, 0.75, 'D', { normZ: 0.3, radius: 0.095, portrait: PORTRAIT, bioguideId:'S000148', name:'Sen. Chuck Schumer' });
const mpPlain  = inst.addMemberPin(0.42, 0.42, 'R', { normZ: 0, radius: 0.095 });

RESULTS.dotRadius = dotEntry.mesh.geometry.parameters.radius;          // 0.034 — slim rule
RESULTS.plainRadius = plain.mesh.geometry.parameters.radius;           // 0.05
RESULTS.memberRadius = mp.mesh.geometry.parameters.radius;             // ≈0.084 (0.095×0.68×1.3)
RESULTS.memberPlainRadius = mpPlain.mesh.geometry.parameters.radius;   // 0.1235

inst.setBoundaryVisible(true);
inst.setBoundaryContent({
  positive: { text:'realized — test wash', photo: FALLBACK, photoAlpha: 0.20 },
  negative: { text:'frustrated — test wash', photo: FALLBACK, photoAlpha: 0.20 },
});
inst.spinTo(24, 12, 1200);

document.getElementById('hot').onclick = () => { mp.portraitHot = !mp.portraitHot; report(); };

function report() {
  RESULTS.dotHasPortrait = !!dotEntry.portraitSprite;
  RESULTS.memberHasPortrait = !!mp.portraitSprite;
  RESULTS.memberPlainNoPortrait = !mpPlain.portraitSprite;
  RESULTS.memberHot = !!mp.portraitHot;
  document.getElementById('out').textContent = JSON.stringify(RESULTS, null, 2) +
    '\nexpect: dot slim 0.034 · member slim ≈0.084 · cards on both once portraits load ·\n' +
    'the photographs breathe at idle · attention deepens the member card · washes on both ceilings';
}
setTimeout(report, 1500);
setInterval(() => { if (dotEntry.portraitMat) { RESULTS.liveOpacity = +dotEntry.portraitMat.opacity.toFixed(3); report(); } }, 900);
</script>
</body>
</html>
