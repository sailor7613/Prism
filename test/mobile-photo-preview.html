<!doctype html>
<!-- throwaway harness (2026-07-19 photo-frame session): renders v2 at iPhone
     dimensions so the reading-photograph frames (introit, and the graph
     registers beyond) can be iterated at true phone width in a desktop
     browser. Pass-through: ?event=evt_XXX rides into the iframe. Safe to
     delete. -->
<html><head><meta charset="utf-8"><title>mobile preview — v2 photos</title>
<style>
  body{ margin:0; background:#222; display:flex; gap:24px; justify-content:center; padding:16px; font-family:monospace; color:#aaa; }
  .phone{ display:flex; flex-direction:column; gap:6px; align-items:center; }
  iframe{ width:390px; height:844px; border:2px solid #555; border-radius:24px; background:#000; }
</style></head><body>
<div class="phone"><span>390 × 844 (iPhone)</span><iframe id="fr" src="../v2/index.html"></iframe></div>
<script>
  const q = location.search;                       // ?event=evt_003 etc.
  if (q) document.getElementById('fr').src = '../v2/index.html' + q;
</script>
</body></html>
