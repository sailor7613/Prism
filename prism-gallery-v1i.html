<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prism — Gallery v1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    height: 100%; overflow: hidden; 
    font-family: 'Georgia', serif;
    touch-action: none;
    transition: background-color 1.2s ease;
  }
  body { background: #0c0b09; }
  body.light { background: #e8e4dc; }

  #scene-container {
    position: absolute; top: 0; left: 0; right: 0; height: 65%;
    cursor: grab;
  }
  #scene-container:active { cursor: grabbing; }

  #info-card {
    position: absolute; top: 12%; right: 20px;
    max-width: 250px; padding: 16px 20px;
    border-radius: 3px; opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
    background: rgba(18, 16, 13, 0.94);
    border: 1px solid rgba(245, 240, 232, 0.08);
    color: #f5f0e8;
  }
  body.light #info-card {
    background: rgba(255, 255, 252, 0.92);
    border: 1px solid rgba(20, 18, 14, 0.08);
    color: #1a1814;
  }
  #info-card.visible { opacity: 1; pointer-events: auto; }
  #info-card h3 {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 6px; font-weight: normal;
  }
  #info-card p { font-size: 11.5px; line-height: 1.6; opacity: 0.6; }
  #info-card .close-btn {
    position: absolute; top: 4px; right: 8px;
    background: none; border: none; font-size: 16px; cursor: pointer;
    opacity: 0.3; color: inherit;
  }

  #vignette {
    position: absolute; top: 0; left: 0; right: 0; height: 65%;
    pointer-events: none; z-index: 2;
    transition: opacity 1.2s ease;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,7,5,0.65) 100%);
  }
  body.light #vignette { opacity: 0.3; }

  #touch-hint {
    position: absolute; bottom: calc(35% + 12px); left: 50%;
    transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    z-index: 5; transition: opacity 3s ease;
    color: rgba(245,240,232,0.12);
  }
  body.light #touch-hint { color: rgba(20,18,14,0.15); }

  #mode-toggle {
    position: absolute; top: 14px; right: 16px; z-index: 10;
    background: none; border: 1px solid rgba(245,240,232,0.1);
    border-radius: 3px; padding: 5px 12px;
    font-family: 'Georgia', serif; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.8s ease;
    color: rgba(245,240,232,0.3);
  }
  body.light #mode-toggle {
    color: rgba(20,18,14,0.35);
    border-color: rgba(20,18,14,0.1);
  }

  #divider {
    position: absolute; top: 65%; left: 0; right: 0; height: 1px; z-index: 5;
    background: linear-gradient(90deg, transparent 5%, rgba(245,240,232,0.08) 30%, rgba(245,240,232,0.08) 70%, transparent 95%);
  }
  body.light #divider {
    background: linear-gradient(90deg, transparent 5%, rgba(20,18,14,0.08) 30%, rgba(20,18,14,0.08) 70%, transparent 95%);
  }

  #lower-triptych {
    position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
    display: flex; flex-direction: column; z-index: 5;
    transition: background-color 1.2s ease, color 1.2s ease;
    background: #0d0c0a; color: #f5f0e8;
  }
  body.light #lower-triptych { background: #f0ece4; color: #1a1814; }

  .lower-nav {
    display: flex; justify-content: center; gap: 28px;
    padding: 14px 0 10px;
    border-bottom: 1px solid rgba(245,240,232,0.04);
  }
  body.light .lower-nav { border-bottom-color: rgba(20,18,14,0.06); }
  .lower-nav button {
    background: none; border: none;
    font-family: 'Georgia', serif; font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; padding: 4px 0;
    border-bottom: 1px solid transparent; transition: all 0.3s;
    color: rgba(245,240,232,0.22);
  }
  body.light .lower-nav button { color: rgba(20,18,14,0.25); }
  .lower-nav button.active {
    color: rgba(245,240,232,0.65); border-bottom-color: rgba(245,240,232,0.2);
  }
  body.light .lower-nav button.active {
    color: rgba(20,18,14,0.7); border-bottom-color: rgba(20,18,14,0.2);
  }

  .lower-content {
    flex: 1; display: flex; align-items: center;
    justify-content: center; padding: 16px 24px;
  }
  .clipboard-card {
    border-radius: 3px; padding: 20px 24px;
    max-width: 380px; width: 100%; text-align: center;
    background: rgba(245,240,232,0.02); border: 1px solid rgba(245,240,232,0.04);
  }
  body.light .clipboard-card {
    background: rgba(20,18,14,0.02); border-color: rgba(20,18,14,0.06);
  }
  .clipboard-card h4 {
    font-size: 12px; font-weight: normal;
    letter-spacing: 0.08em; margin-bottom: 10px; opacity: 0.45;
  }
  .clipboard-card p { font-size: 11px; line-height: 1.65; opacity: 0.25; }

  #wordmark {
    position: absolute; bottom: 8px; right: 16px;
    font-size: 10px; letter-spacing: 0.2em; z-index: 6;
  }
  #wordmark span:nth-child(1) { color: #3a5a8c; }
  #wordmark span:nth-child(2) { color: #c94040; }
  #wordmark span:nth-child(3) { color: #c87a30; }
  #wordmark span:nth-child(4) { color: #4a8c5a; }
  #wordmark span:nth-child(5) { color: #c87a30; }
</style>
</head>
<body>

<div id="scene-container"></div>
<div id="vignette"></div>
<button id="mode-toggle" onclick="toggleMode()">Skylight</button>
<div id="touch-hint">drag to orbit · scroll to zoom · hold art to view</div>

<div id="info-card">
  <button class="close-btn" onclick="closeInfoCard()">&times;</button>
  <h3 id="info-title"></h3>
  <p id="info-body"></p>
</div>

<div id="divider"></div>

<div id="lower-triptych">
  <div class="lower-nav">
    <button class="active">Diatribe</button>
    <button>Response</button>
    <button>Dialect</button>
  </div>
  <div class="lower-content">
    <div class="clipboard-card">
      <h4>Your Instrument Panel</h4>
      <p>The flat triptych lives here. What you do on the clipboard changes what you see in the gallery above.</p>
    </div>
  </div>
</div>

<div id="wordmark">
  <span>P</span><span>r</span><span>i</span><span>s</span><span>m</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// PRISM GALLERY v1.1
// Vertical graph sculpture. Celestial skylight. Translucent walls.
// Press-hold on art frames to walk camera over.
// ============================================================

const container = document.getElementById('scene-container');
const infoCard = document.getElementById('info-card');
const touchHint = document.getElementById('touch-hint');
let isDarkMode = true;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0c0b09, 10, 35);
scene.background = new THREE.Color(0x0c0b09);

const camera = new THREE.PerspectiveCamera(36, container.clientWidth / container.clientHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const lights = {};
const C = { authLeft: 0x3a5a8c, authRight: 0xc94040, libLeft: 0x4a8c5a, libRight: 0xc87a30, cream: 0xf5f0e8 };

// ============================================================
// ROOM
// ============================================================
const ROOM_W = 16, ROOM_D = 16, ROOM_H = 9;
const WD = ROOM_D/2, WW = ROOM_W/2;
const GRAPH_CENTER_Y = 2.8, GRAPH_SIZE = 2.8, GH = GRAPH_SIZE/2;

// Floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(ROOM_W*2, ROOM_D*2),
  new THREE.MeshStandardMaterial({ color: 0x12110e, roughness: 0.8, metalness: 0.02 })
);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);

// Floor tiles
(function(){
  const mat = new THREE.LineBasicMaterial({ color: 0xf5f0e8, transparent: true, opacity: 0.02 });
  for (let i = -16; i <= 16; i += 1.8) {
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-16,0.001,i), new THREE.Vector3(16,0.001,i)
    ]), mat));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i,0.001,-16), new THREE.Vector3(i,0.001,16)
    ]), mat));
  }
})();

// Walls — translucent in dark mode so stars/moon bleed through
const wallDarkColor = 0x13120f;
const wallLightColor = 0xd8d2c8;
const wallConfigs = [
  { w:ROOM_W, h:ROOM_H, x:0, y:ROOM_H/2, z:-WD, ry:0, name:'back' },
  { w:ROOM_W, h:ROOM_H, x:0, y:ROOM_H/2, z:WD, ry:Math.PI, name:'front' },
  { w:ROOM_D, h:ROOM_H, x:-WW, y:ROOM_H/2, z:0, ry:Math.PI/2, name:'left' },
  { w:ROOM_D, h:ROOM_H, x:WW, y:ROOM_H/2, z:0, ry:-Math.PI/2, name:'right' },
];
const walls = [];
wallConfigs.forEach(cfg => {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(cfg.w, cfg.h),
    new THREE.MeshStandardMaterial({
      color: wallDarkColor, roughness: 0.92, metalness: 0,
      transparent: true, opacity: 0.55, depthWrite: false,
      side: THREE.DoubleSide,
    })
  );
  m.position.set(cfg.x, cfg.y, cfg.z); m.rotation.y = cfg.ry;
  m.receiveShadow = true; m.userData.isWall = true; m.userData.wallName = cfg.name;
  m.renderOrder = 0;
  scene.add(m); walls.push(m);
});

// Ceiling panels
const skylightSize = 10, sH = skylightSize/2;
const ceilPanels = [];
[
  { w:ROOM_W, d:(ROOM_D-skylightSize)/2, x:0, z:-(WD-(ROOM_D-skylightSize)/4) },
  { w:ROOM_W, d:(ROOM_D-skylightSize)/2, x:0, z:(WD-(ROOM_D-skylightSize)/4) },
  { w:(ROOM_W-skylightSize)/2, d:skylightSize, x:-(WW-(ROOM_W-skylightSize)/4), z:0 },
  { w:(ROOM_W-skylightSize)/2, d:skylightSize, x:(WW-(ROOM_W-skylightSize)/4), z:0 },
].forEach(p => {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(p.w, p.d),
    new THREE.MeshStandardMaterial({ color: 0x0a0908, roughness: 1.0, transparent: true, opacity: 0.75, depthWrite: false })
  );
  m.rotation.x = Math.PI/2; m.position.set(p.x, ROOM_H, p.z);
  m.userData.isCeiling = true; scene.add(m); ceilPanels.push(m);
});

// Skylight frame with photograph texture
const fMat = new THREE.LineBasicMaterial({ color: 0xf5f0e8, transparent: true, opacity: 0.06 });
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-sH,ROOM_H-0.02,-sH), new THREE.Vector3(sH,ROOM_H-0.02,-sH),
  new THREE.Vector3(sH,ROOM_H-0.02,sH), new THREE.Vector3(-sH,ROOM_H-0.02,sH),
  new THREE.Vector3(-sH,ROOM_H-0.02,-sH),
]), fMat));

// Ionic columns
function buildColumn(x, z) {
  const colGroup = new THREE.Group();
  const colMat = new THREE.MeshStandardMaterial({ color: 0x1a1814, roughness: 0.45, metalness: 0.08 });
  
  // Base — stacked torus moldings (Attic base)
  const base1 = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.06, 24), colMat.clone());
  base1.position.set(x, 0.03, z); base1.userData.isColumn = true; colGroup.add(base1);
  const baseTorus = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.04, 8, 24), colMat.clone());
  baseTorus.rotation.x = Math.PI/2; baseTorus.position.set(x, 0.1, z);
  baseTorus.userData.isColumn = true; colGroup.add(baseTorus);
  const base2 = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.30, 0.05, 24), colMat.clone());
  base2.position.set(x, 0.15, z); base2.userData.isColumn = true; colGroup.add(base2);
  
  // Shaft — fluted (use a custom shape)
  const shaftH = ROOM_H - 1.2;
  const shaftGeo = new THREE.CylinderGeometry(0.16, 0.19, shaftH, 20);
  // Simulate fluting by modulating vertices radially
  const pos = shaftGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const px = pos.getX(i), pz = pos.getZ(i);
    const angle = Math.atan2(pz, px);
    const fluteDepth = 0.012 * (1 + Math.cos(angle * 20));
    const r = Math.sqrt(px*px + pz*pz);
    const newR = r - fluteDepth;
    pos.setX(i, px * (newR/r));
    pos.setZ(i, pz * (newR/r));
  }
  shaftGeo.computeVertexNormals();
  const shaft = new THREE.Mesh(shaftGeo, colMat.clone());
  shaft.position.set(x, 0.18 + shaftH/2, z);
  shaft.castShadow = true; shaft.userData.isColumn = true; colGroup.add(shaft);
  
  // Vertical beading — thin raised ridges between flutes
  const beadMat = new THREE.MeshStandardMaterial({ color: 0x1e1a14, roughness: 0.35, metalness: 0.12 });
  const beadCount = 20;
  for (let i = 0; i < beadCount; i++) {
    const angle = (i / beadCount) * Math.PI * 2;
    const beadR = 0.008;
    const beadCurve = new THREE.LineCurve3(
      new THREE.Vector3(Math.cos(angle)*0.175, -shaftH/2 + 0.1, Math.sin(angle)*0.175),
      new THREE.Vector3(Math.cos(angle)*0.165, shaftH/2 - 0.1, Math.sin(angle)*0.165)
    );
    const beadGeo = new THREE.TubeGeometry(beadCurve, 2, beadR, 4, false);
    const bead = new THREE.Mesh(beadGeo, beadMat);
    bead.position.set(x, 0.18 + shaftH/2, z);
    bead.userData.isColumn = true;
    colGroup.add(bead);
  }
  
  // Neck ring
  const neck = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.025, 8, 24), colMat.clone());
  neck.rotation.x = Math.PI/2; neck.position.set(x, 0.18 + shaftH + 0.02, z);
  neck.userData.isColumn = true; colGroup.add(neck);
  
  // Capital — Ionic volutes (simplified as curved torus segments on each side)
  const capH = 0.15;
  const capPlate = new THREE.Mesh(new THREE.BoxGeometry(0.52, capH, 0.52), colMat.clone());
  capPlate.position.set(x, 0.18 + shaftH + 0.1 + capH/2, z);
  capPlate.userData.isColumn = true; colGroup.add(capPlate);
  
  // Volute scrolls (one on each side — torus knots as decorative spirals)
  [-1, 1].forEach(side => {
    const volute = new THREE.Mesh(
      new THREE.TorusGeometry(0.08, 0.02, 8, 16),
      colMat.clone()
    );
    volute.position.set(x + side * 0.24, 0.18 + shaftH + 0.12, z);
    volute.rotation.y = Math.PI/2;
    volute.userData.isColumn = true;
    colGroup.add(volute);
    // Inner spiral
    const inner = new THREE.Mesh(
      new THREE.TorusGeometry(0.04, 0.015, 8, 12),
      colMat.clone()
    );
    inner.position.set(x + side * 0.24, 0.18 + shaftH + 0.12, z);
    inner.rotation.y = Math.PI/2;
    inner.userData.isColumn = true;
    colGroup.add(inner);
  });
  
  // Abacus (flat slab on top)
  const abacus = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.05, 0.56), colMat.clone());
  abacus.position.set(x, ROOM_H - 0.025, z);
  abacus.userData.isColumn = true; colGroup.add(abacus);
  
  scene.add(colGroup);
}
const CD = 4;
buildColumn(-CD,-CD); buildColumn(CD,-CD); buildColumn(-CD,CD); buildColumn(CD,CD);

// Star dome — large sphere surrounding the entire room
const starCount = 800;
const starPositions = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  // Distribute on a large sphere
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 50 + Math.random() * 30;
  starPositions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i*3+1] = Math.abs(r * Math.cos(phi)) * 0.6 + 5; // bias upward
  starPositions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
  starSizes[i] = 0.5 + Math.random() * 1.2;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
// Round star texture
const starCanvas = document.createElement('canvas');
starCanvas.width = 32; starCanvas.height = 32;
const starCtx = starCanvas.getContext('2d');
const starGrad = starCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
starGrad.addColorStop(0, 'rgba(255,240,180,1)');
starGrad.addColorStop(0.3, 'rgba(255,220,120,0.8)');
starGrad.addColorStop(0.7, 'rgba(255,200,60,0.2)');
starGrad.addColorStop(1, 'rgba(255,180,20,0)');
starCtx.fillStyle = starGrad;
starCtx.fillRect(0, 0, 32, 32);
const starTex = new THREE.CanvasTexture(starCanvas);

const starMaterial = new THREE.PointsMaterial({
  map: starTex, color: 0xffd860, size: 1.0, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, fog: false,
  depthWrite: false,
});
const stars = new THREE.Points(starGeo, starMaterial);
stars.renderOrder = -1; // render before walls so they show through
scene.add(stars);

// MOON — phase-accurate procedural texture
// Calculates real lunar phase from today's date.
// To swap to a photo: replace createMoonTexture(512, phase) with:
//   new THREE.TextureLoader().load('your-moon-photo.jpg')
// ============================================================

// Lunar phase: 0 = new moon, 0.5 = full moon, 1 = new moon again
function getLunarPhase() {
  const now = new Date();
  // Known new moon: Jan 6, 2000 18:14 UTC
  const knownNew = new Date(2000, 0, 6, 18, 14, 0);
  const synodicMonth = 29.53058770576; // days
  const daysSince = (now - knownNew) / (1000 * 60 * 60 * 24);
  const phase = ((daysSince % synodicMonth) / synodicMonth);
  return phase < 0 ? phase + 1 : phase;
}

function createMoonTexture(size, phase) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, size, size); // ensure fully transparent background
  const cx = size/2, cy = size/2, r = size/2 - 4;
  
  // Base: cool blue-white sphere with limb darkening
  const baseGrad = ctx.createRadialGradient(cx*0.92, cy*0.88, r*0.05, cx, cy, r);
  baseGrad.addColorStop(0, '#e4e8f8');
  baseGrad.addColorStop(0.25, '#d4d8ea');
  baseGrad.addColorStop(0.55, '#bcc0d0');
  baseGrad.addColorStop(0.8, '#8088a0');
  baseGrad.addColorStop(0.95, '#404860');
  baseGrad.addColorStop(1, '#141828');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = baseGrad; ctx.fill();
  
  // Maria (dark basaltic plains)
  const maria = [
    { x:0.38, y:0.32, rx:0.18, ry:0.12, rot:-0.3, color:'rgba(70,78,98,0.45)' },
    { x:0.55, y:0.42, rx:0.12, ry:0.15, rot:0.1, color:'rgba(66,74,94,0.4)' },
    { x:0.48, y:0.55, rx:0.14, ry:0.10, rot:0.2, color:'rgba(62,70,90,0.35)' },
    { x:0.35, y:0.50, rx:0.08, ry:0.06, rot:-0.1, color:'rgba(68,76,96,0.3)' },
    { x:0.60, y:0.30, rx:0.06, ry:0.08, rot:0.4, color:'rgba(64,72,92,0.35)' },
    { x:0.42, y:0.65, rx:0.10, ry:0.07, rot:-0.2, color:'rgba(66,74,94,0.28)' },
    { x:0.30, y:0.42, rx:0.07, ry:0.09, rot:0.15, color:'rgba(62,70,88,0.3)' },
  ];
  maria.forEach(m => {
    ctx.save();
    ctx.translate(cx + (m.x-0.5)*r*2, cy + (m.y-0.5)*r*2);
    ctx.rotate(m.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, m.rx*r*2, m.ry*r*2, 0, 0, Math.PI*2);
    ctx.fillStyle = m.color; ctx.fill();
    ctx.restore();
  });
  
  // Craters
  const rng = (seed) => { let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; };
  const rand = rng(42);
  for (let i=0; i<90; i++) {
    const angle = rand()*Math.PI*2;
    const dist = rand()*r*0.88;
    const crx = cx + Math.cos(angle)*dist;
    const cry = cy + Math.sin(angle)*dist;
    const cr = 1 + rand()*(size*0.022);
    const dx=crx-cx, dy=cry-cy;
    if (Math.sqrt(dx*dx+dy*dy)+cr > r-4) continue;
    ctx.beginPath(); ctx.arc(crx, cry, cr, 0, Math.PI*2);
    ctx.fillStyle = `rgba(70,68,62,${0.12+rand()*0.18})`; ctx.fill();
    ctx.beginPath(); ctx.arc(crx-cr*0.25, cry-cr*0.25, cr*1.1, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(220,218,212,${0.08+rand()*0.12})`;
    ctx.lineWidth = 0.5+rand()*0.8; ctx.stroke();
  }
  
  // Ray craters
  [{x:0.42,y:0.75,cr:size*0.018,rays:8},{x:0.55,y:0.25,cr:size*0.014,rays:6}].forEach(rc => {
    const rcx=cx+(rc.x-0.5)*r*2, rcy=cy+(rc.y-0.5)*r*2;
    for (let j=0;j<rc.rays;j++) {
      const a=(j/rc.rays)*Math.PI*2+0.3;
      const len=rc.cr*(3+rand()*4);
      ctx.beginPath(); ctx.moveTo(rcx,rcy);
      ctx.lineTo(rcx+Math.cos(a)*len, rcy+Math.sin(a)*len);
      ctx.strokeStyle=`rgba(210,208,200,${0.06+rand()*0.05})`;
      ctx.lineWidth=1+rand()*1.2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(rcx,rcy,rc.cr,0,Math.PI*2);
    ctx.fillStyle='rgba(230,228,220,0.35)'; ctx.fill();
  });
  
  // Surface noise
  for (let i=0;i<4000;i++) {
    const nx=rand()*size, ny=rand()*size;
    const ndx=nx-cx, ndy=ny-cy;
    if (Math.sqrt(ndx*ndx+ndy*ndy)>r-2) continue;
    const v = rand()>0.5 ? 190 : 100;
    ctx.fillStyle=`rgba(${v},${v-3},${v-8},${0.015+rand()*0.03})`;
    ctx.fillRect(nx,ny,1+rand()*1.5,1+rand()*1.5);
  }
  
  // Clip to circle
  ctx.globalCompositeOperation='destination-in';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='white'; ctx.fill();
  ctx.globalCompositeOperation='source-over';
  
  // ---- PHASE SHADOW ----
  // phase: 0=new, 0.25=first quarter, 0.5=full, 0.75=last quarter
  // The terminator is an ellipse whose x-radius varies with phase
  if (Math.abs(phase - 0.5) > 0.02) { // skip if nearly full
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
    
    // Determine illumination direction and shadow shape
    // 0-0.5: waxing (right side lit), 0.5-1: waning (left side lit)
    const waxing = phase < 0.5;
    const illumFraction = waxing ? phase * 2 : (1 - phase) * 2; // 0=new, 1=full
    
    // Shadow: draw dark overlay, then carve out the lit portion
    ctx.fillStyle = 'rgba(5,5,8,0.92)';
    ctx.fillRect(0, 0, size, size);
    
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    
    // The lit area: a half-circle + an elliptical terminator
    if (waxing) {
      // Right half is lit base, terminator curves from right
      ctx.arc(cx, cy, r-1, -Math.PI/2, Math.PI/2, false); // right semicircle
      // Terminator: ellipse connecting top and bottom
      const termX = r * (2 * illumFraction - 1); // -r to +r as phase goes 0 to 0.5
      ctx.ellipse(cx, cy, Math.abs(termX)+1, r-1, 0, Math.PI/2, -Math.PI/2, termX > 0 ? false : true);
    } else {
      // Left half is lit base
      ctx.arc(cx, cy, r-1, Math.PI/2, -Math.PI/2, false); // left semicircle
      const termX = r * (2 * illumFraction - 1);
      ctx.ellipse(cx, cy, Math.abs(termX)+1, r-1, 0, -Math.PI/2, Math.PI/2, termX > 0 ? false : true);
    }
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }
  
  // Subtle blue atmosphere edge (inside circle)
  const edgeGrad = ctx.createRadialGradient(cx,cy,r*0.88, cx,cy,r-1);
  edgeGrad.addColorStop(0, 'rgba(190,200,225,0)');
  edgeGrad.addColorStop(0.6, 'rgba(190,200,225,0.06)');
  edgeGrad.addColorStop(1, 'rgba(170,185,218,0.18)');
  ctx.beginPath(); ctx.arc(cx,cy,r-1,0,Math.PI*2);
  ctx.fillStyle=edgeGrad; ctx.fill();
  
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function buildAcaciaTree() {
  const tree = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({
    color: 0x3d2a18, roughness: 0.85, metalness: 0, fog: false,
  });
  const darkBarkMat = new THREE.MeshStandardMaterial({
    color: 0x2a1c10, roughness: 0.9, metalness: 0, fog: false,
  });
  const leafMat = new THREE.MeshStandardMaterial({
    color: 0x3a5525, roughness: 0.8, metalness: 0,
    transparent: true, opacity: 0.75, fog: false, side: THREE.DoubleSide,
  });
  const leafMatLight = new THREE.MeshStandardMaterial({
    color: 0x4a6830, roughness: 0.75, metalness: 0,
    transparent: true, opacity: 0.6, fog: false, side: THREE.DoubleSide,
  });
  const leafMatEdge = new THREE.MeshStandardMaterial({
    color: 0x5a7a38, roughness: 0.7, metalness: 0,
    transparent: true, opacity: 0.45, fog: false, side: THREE.DoubleSide,
  });
  
  // Thick trunk — splits into a Y around 40% up
  const trunkCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0.1, 1.5, 0.05),
    new THREE.Vector3(0.2, 3, 0),
    new THREE.Vector3(0.1, 4.5, -0.05),
  ]);
  tree.add(new THREE.Mesh(new THREE.TubeGeometry(trunkCurve, 16, 0.35, 8, false), darkBarkMat));
  
  // Major spreading arms — the defining feature
  const arms = [
    // Right arm — long dramatic horizontal reach
    { pts: [[0.2,3,0],[1.5,4.2,0.3],[3.5,5,0.5],[5.5,5.5,0.3]], r: 0.18 },
    // Left arm — sweeps wide
    { pts: [[0.1,3.5,-0.05],[-1.2,4.5,-0.3],[-3.5,5.2,-0.2],[-5,5.8,0.2]], r: 0.16 },
    // Right-forward arm
    { pts: [[0.2,3.8,0],[1.8,4.8,1],[3.8,5.5,1.5]], r: 0.13 },
    // Left-back arm
    { pts: [[0.1,4,-0.05],[-1.5,5,-1.2],[-3,5.5,-1.8]], r: 0.12 },
    // Center upward
    { pts: [[0.1,4.5,-0.05],[0,5.5,0],[0.3,6.2,0.1]], r: 0.14 },
    // Right-back
    { pts: [[0.2,3.5,0],[2,4.5,-1],[3.5,5.2,-1.2]], r: 0.10 },
    // Left-forward
    { pts: [[0.1,4,-0.05],[-2,5,1],[-3.5,5.3,1.5]], r: 0.10 },
    // Sub-branches off main arms
    { pts: [[3.5,5,0.5],[4.5,5.6,1.5],[5,5.4,2.5]], r: 0.06 },
    { pts: [[-3.5,5.2,-0.2],[-4.5,5.8,0.8],[-5.5,5.6,1.5]], r: 0.06 },
    { pts: [[5.5,5.5,0.3],[6,5.3,-0.5],[6.5,5.6,-1]], r: 0.05 },
    { pts: [[-5,5.8,0.2],[-6,5.5,-0.5],[-6.5,5.8,-1.2]], r: 0.05 },
  ];
  
  arms.forEach(a => {
    const pts = a.pts.map(p => new THREE.Vector3(...p));
    const curve = new THREE.CatmullRomCurve3(pts);
    tree.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 10, a.r, 6, false), trunkMat));
  });
  
  // Canopy — very wide, very flat, umbrella shape
  // Main dense canopy layer
  const canopy = [
    // Core dense mass
    { x:0, y:6, z:0, rx:4, ry:0.5, rz:3.5 },
    { x:-1, y:5.8, z:0.5, rx:3.5, ry:0.55, rz:3 },
    { x:1.5, y:5.7, z:-0.3, rx:3.2, ry:0.5, rz:2.8 },
    // Right extension
    { x:4, y:5.5, z:0.3, rx:2.5, ry:0.4, rz:2 },
    { x:5.5, y:5.4, z:0, rx:1.8, ry:0.35, rz:1.5 },
    // Left extension
    { x:-3.5, y:5.7, z:-0.2, rx:2.5, ry:0.4, rz:2.2 },
    { x:-5, y:5.6, z:0.3, rx:1.8, ry:0.35, rz:1.6 },
    // Forward/back reach
    { x:1, y:5.6, z:2, rx:2, ry:0.35, rz:1.5 },
    { x:-1, y:5.6, z:-1.8, rx:2.2, ry:0.35, rz:1.5 },
    // Far tips
    { x:6, y:5.3, z:-0.5, rx:1.2, ry:0.25, rz:1 },
    { x:-6, y:5.5, z:-0.8, rx:1.2, ry:0.25, rz:1 },
    { x:3, y:5.4, z:2.2, rx:1.5, ry:0.3, rz:1.2 },
    { x:-3, y:5.5, z:1.8, rx:1.3, ry:0.28, rz:1.1 },
  ];
  
  canopy.forEach((cp, i) => {
    const mat = i < 3 ? leafMat : (i < 9 ? leafMatLight : leafMatEdge);
    const geo = new THREE.SphereGeometry(1, 10, 8);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(cp.x, cp.y, cp.z);
    mesh.scale.set(cp.rx, cp.ry, cp.rz);
    tree.add(mesh);
  });
  
  // Set renderOrder on all tree parts so it renders OVER walls
  tree.traverse(child => {
    if (child.isMesh) {
      child.renderOrder = 1;
    }
  });
  
  return tree;
}

function makeLeg(x, y, z, h, r, mat) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r*0.85, r, h, 6), mat);
  m.position.set(x, y + h/2, z); return m;
}

// --- ELEPHANT (behind the back wall) ---
function buildElephant() {
  const g = new THREE.Group();
  const m = animalMats.elephantBody;
  const md = animalMats.elephantDark;
  
  // Body — large barrel
  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10), m);
  body.scale.set(1.6, 1.1, 1.1);
  body.position.set(0, 2.2, 0);
  g.add(body);
  
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 10, 8), m);
  head.position.set(1.6, 2.6, 0);
  g.add(head);
  
  // Eyes — small and deep-set
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1008, fog: false });
  const eyeWhite = new THREE.MeshBasicMaterial({ color: 0xe8e0d0, fog: false });
  [-1, 1].forEach(side => {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4), eyeWhite);
    white.position.set(1.95, 2.72, side * 0.32);
    g.add(white);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4), eyeMat);
    eye.position.set(1.97, 2.72, side * 0.32);
    g.add(eye);
  });
  
  // Trunk — curved tube
  const trunkCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(2.0, 2.3, 0),
    new THREE.Vector3(2.4, 1.8, 0.1),
    new THREE.Vector3(2.5, 1.0, -0.1),
    new THREE.Vector3(2.3, 0.4, 0.15),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(trunkCurve, 10, 0.12, 6, false), md));
  
  // Ears — flat discs
  [-1, 1].forEach(side => {
    const ear = new THREE.Mesh(new THREE.CircleGeometry(0.6, 8), md);
    ear.position.set(1.3, 2.8, side * 0.55);
    ear.rotation.y = side * 0.3;
    ear.material = md.clone();
    ear.material.side = THREE.DoubleSide;
    g.add(ear);
  });
  
  // Tusks
  [-1, 1].forEach(side => {
    const tuskCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(1.8, 2.0, side * 0.2),
      new THREE.Vector3(2.2, 1.6, side * 0.3),
      new THREE.Vector3(2.4, 1.5, side * 0.25),
    ]);
    const tuskMat = new THREE.MeshStandardMaterial({ color: 0xf0ebe0, roughness: 0.4, fog: false });
    g.add(new THREE.Mesh(new THREE.TubeGeometry(tuskCurve, 6, 0.04, 4, false), tuskMat));
  });
  
  // Legs
  g.add(makeLeg(-0.7, 0, -0.45, 1.4, 0.22, m));
  g.add(makeLeg(-0.7, 0, 0.45, 1.4, 0.22, m));
  g.add(makeLeg(0.7, 0, -0.45, 1.4, 0.24, m));
  g.add(makeLeg(0.7, 0, 0.45, 1.4, 0.24, m));
  
  // Tail
  const tailCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-1.6, 2.4, 0),
    new THREE.Vector3(-2.0, 2.0, 0.1),
    new THREE.Vector3(-2.1, 1.5, -0.05),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(tailCurve, 6, 0.03, 4, false), md));
  
  g.traverse(c => { if (c.isMesh) c.renderOrder = 1; });
  return g;
}

function buildGiraffe() {
  const g = new THREE.Group();

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 10, 8), m);

    new THREE.Vector3(0.6, 3.5, 0),
    new THREE.Vector3(0.8, 4.5, 0.05),
    new THREE.Vector3(0.7, 5.5, 0),
    new THREE.Vector3(0.5, 6.5, -0.05),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(neckCurve, 12, 0.16, 6, false), m));
  
  // Head — small and elegant
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 6), mp);
  head.scale.set(1.4, 1, 0.9);
  head.position.set(0.5, 6.7, 0);
  g.add(head);
  
  // Muzzle
  const gmuzzle = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 4), m);
  gmuzzle.scale.set(1.2, 0.7, 0.8);
  gmuzzle.position.set(0.72, 6.62, 0);
  g.add(gmuzzle);
  
  // Eyes — large and gentle
  const geyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1008, fog: false });
  const geyeWhite = new THREE.MeshBasicMaterial({ color: 0xf0ebe0, fog: false });
  [-1, 1].forEach(side => {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4), geyeWhite);
    white.position.set(0.6, 6.76, side * 0.14);
    g.add(white);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.028, 6, 4), geyeMat);
    eye.position.set(0.62, 6.76, side * 0.14);
    g.add(eye);
  });
  
  // Nostrils
  [-1, 1].forEach(side => {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.015, 4, 3), geyeMat);
    nostril.position.set(0.78, 6.62, side * 0.04);
    g.add(nostril);
  });
  
  // Ossicones (horns)
  [-1, 1].forEach(side => {
    const horn = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.25, 4), mp);
    horn.position.set(0.5, 6.95, side * 0.08);
    g.add(horn);
    // Tips
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 4), animalMats.giraffeSpots);
    tip.position.set(0.5, 7.1, side * 0.08);
    g.add(tip);
  });
  
  // Legs — very long and thin
  g.add(makeLeg(-0.4, 0, -0.25, 2.8, 0.09, m));
  g.add(makeLeg(-0.4, 0, 0.25, 2.8, 0.09, m));
  g.add(makeLeg(0.4, 0, -0.25, 2.6, 0.1, m));
  g.add(makeLeg(0.4, 0, 0.25, 2.6, 0.1, m));
  
  // Spots on neck (small dark spheres)
  const spots = animalMats.giraffeSpots;
  for (let i = 0; i < 12; i++) {
    const t = 0.1 + i * 0.07;
    const pt = neckCurve.getPointAt(t);
    const spot = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 3), spots);
    spot.position.copy(pt);
    spot.position.z += (Math.sin(i * 2.5) * 0.12);
    g.add(spot);
  }
  
  // Tail
  const tailCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.8, 3.5, 0),
    new THREE.Vector3(-1.1, 2.8, 0.1),
    new THREE.Vector3(-1.0, 2.3, -0.05),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(tailCurve, 6, 0.02, 4, false), m));
  
  g.traverse(c => { if (c.isMesh) c.renderOrder = 1; });
  return g;
}

// --- ZEBRA (behind the front wall) ---
function buildZebra() {
  const g = new THREE.Group();
  const mw = animalMats.zebraWhite;
  const mb = animalMats.zebraBlack;
  
  // Body — barrel
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.65, 10, 8), mw);
  body.scale.set(1.5, 0.9, 0.85);
  body.position.set(0, 1.6, 0);
  g.add(body);
  
  // Stripes on body — thin dark rings
  for (let i = 0; i < 8; i++) {
    const stripe = new THREE.Mesh(
      new THREE.TorusGeometry(0.58 + i*0.01, 0.025, 4, 12),
      mb
    );
    stripe.position.set(-0.5 + i * 0.14, 1.6, 0);
    stripe.rotation.y = Math.PI/2 + (Math.random()-0.5)*0.15;
    g.add(stripe);
  }
  
  // Neck
  const neckCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0.7, 1.9, 0),
    new THREE.Vector3(1.0, 2.3, 0),
    new THREE.Vector3(1.1, 2.7, 0),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(neckCurve, 8, 0.14, 6, false), mw));
  
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6), mw);
  head.scale.set(1.5, 1, 0.9);
  head.position.set(1.2, 2.85, 0);
  g.add(head);
  
  // Eyes
  const zeyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1008, fog: false });
  const zeyeWhite = new THREE.MeshBasicMaterial({ color: 0xf0ebe0, fog: false });
  [-1, 1].forEach(side => {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 4), zeyeWhite);
    white.position.set(1.3, 2.92, side * 0.12);
    g.add(white);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 4), zeyeMat);
    eye.position.set(1.32, 2.92, side * 0.12);
    g.add(eye);
  });
  
  // Nostrils
  [-1, 1].forEach(side => {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.012, 4, 3), zeyeMat);
    nostril.position.set(1.45, 2.78, side * 0.035);
    g.add(nostril);
  });
  
  // Muzzle
  const muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 4), mb);
  muzzle.scale.set(1.3, 0.8, 0.9);
  muzzle.position.set(1.4, 2.78, 0);
  g.add(muzzle);
  
  // Ears
  [-1, 1].forEach(side => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.15, 4), mb);
    ear.position.set(1.1, 3.05, side * 0.1);
    ear.rotation.z = side * 0.3;
    g.add(ear);
  });
  
  // Mane — ridge along neck
  for (let i = 0; i < 6; i++) {
    const t = 0.1 + i * 0.15;
    const pt = neckCurve.getPointAt(t);
    const tuft = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.02), mb);
    tuft.position.set(pt.x, pt.y + 0.12, pt.z);
    g.add(tuft);
  }
  
  // Legs
  g.add(makeLeg(-0.45, 0, -0.25, 1.15, 0.08, mw));
  g.add(makeLeg(-0.45, 0, 0.25, 1.15, 0.08, mw));
  g.add(makeLeg(0.35, 0, -0.25, 1.1, 0.08, mw));
  g.add(makeLeg(0.35, 0, 0.25, 1.1, 0.08, mw));
  
  // Hooves (dark tips)
  [[-0.45,-0.25],[-.45,.25],[.35,-.25],[.35,.25]].forEach(([fx,fz]) => {
    const hoof = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.08, 6), mb);
    hoof.position.set(fx, 0.04, fz);
    g.add(hoof);
  });
  
  // Tail
  const tailCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.85, 1.9, 0),
    new THREE.Vector3(-1.1, 1.5, 0.1),
    new THREE.Vector3(-1.15, 1.0, -0.05),
  ]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(tailCurve, 6, 0.02, 4, false), mb));
  
  // Tail tuft
  const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 3), mb);
  tuft.position.set(-1.15, 1.0, -0.05);
  g.add(tuft);
  
  g.traverse(c => { if (c.isMesh) c.renderOrder = 1; });
  return g;
}

const frameObjects = []; // { group, artMesh, wallName, viewPos, viewTarget }

function buildFrame(wallDir) {
  const frameGroup = new THREE.Group();
  const fw = 2.0, fh = 1.4, frameDepth = 0.06, barThick = 0.05;
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1c1810, roughness: 0.4, metalness: 0.06 });
  
  function bar(w,h,d,x,y,z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), frameMat);
    m.position.set(x,y,z); m.castShadow = true; return m;
  }
  frameGroup.add(bar(fw+barThick*2, barThick, frameDepth, 0, fh/2+barThick/2, frameDepth/2));
  frameGroup.add(bar(fw+barThick*2, barThick, frameDepth, 0, -fh/2-barThick/2, frameDepth/2));
  frameGroup.add(bar(barThick, fh, frameDepth, -fw/2-barThick/2, 0, frameDepth/2));
  frameGroup.add(bar(barThick, fh, frameDepth, fw/2+barThick/2, 0, frameDepth/2));
  
  // Mat
  frameGroup.add(new THREE.Mesh(
    new THREE.PlaneGeometry(fw, fh),
    new THREE.MeshStandardMaterial({ color: 0xf0ebe0, roughness: 0.95 })
  ));
  
  // Art surface
  const artW = fw - 0.72, artH = fh - 0.72;
  const artMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(artW, artH),
    new THREE.MeshStandardMaterial({ color: 0x0e0d0b, roughness: 0.9 })
  );
  artMesh.position.z = 0.008;
  artMesh.userData.isArtSurface = true;
  artMesh.userData.wallName = wallDir;
  frameGroup.add(artMesh);
  
  // Inner mat line
  const iw = artW/2, ih = artH/2;
  frameGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-iw,-ih,0.009), new THREE.Vector3(iw,-ih,0.009),
    new THREE.Vector3(iw,ih,0.009), new THREE.Vector3(-iw,ih,0.009),
    new THREE.Vector3(-iw,-ih,0.009),
  ]), new THREE.LineBasicMaterial({ color: 0xd0cbc0, transparent: true, opacity: 0.3 })));
  
  const offset = 0.08;
  let viewPos, viewTarget;
  
  if (wallDir === 'back') {
    frameGroup.position.set(2.5, 3.2, -WD + offset);
    viewPos = new THREE.Vector3(2.5, 3.2, -WD + 3.5);
    viewTarget = new THREE.Vector3(2.5, 3.2, -WD);
  } else if (wallDir === 'front') {
    frameGroup.position.set(-2.5, 3.2, WD - offset);
    frameGroup.rotation.y = Math.PI;
    viewPos = new THREE.Vector3(-2.5, 3.2, WD - 3.5);
    viewTarget = new THREE.Vector3(-2.5, 3.2, WD);
  } else if (wallDir === 'left') {
    frameGroup.position.set(-WW + offset, 3.2, -2);
    frameGroup.rotation.y = Math.PI/2;
    viewPos = new THREE.Vector3(-WW + 3.5, 3.2, -2);
    viewTarget = new THREE.Vector3(-WW, 3.2, -2);
  } else if (wallDir === 'right') {
    frameGroup.position.set(WW - offset, 3.2, 2);
    frameGroup.rotation.y = -Math.PI/2;
    viewPos = new THREE.Vector3(WW - 3.5, 3.2, 2);
    viewTarget = new THREE.Vector3(WW, 3.2, 2);
  }
  
  scene.add(frameGroup);
  
  // Frame spot
  const spotDir = {
    back:  { from: [2.5, 5.5, -WD+1.5], to: [2.5, 3.2, -WD] },
    front: { from: [-2.5, 5.5, WD-1.5], to: [-2.5, 3.2, WD] },
    left:  { from: [-WW+1.5, 5.5, -2], to: [-WW, 3.2, -2] },
    right: { from: [WW-1.5, 5.5, 2], to: [WW, 3.2, 2] },
  }[wallDir];
  const spot = new THREE.SpotLight(0xfff0dd, 0.5, 6, Math.PI*0.15, 0.85, 2);
  spot.position.set(...spotDir.from);
  spot.target.position.set(...spotDir.to);
  scene.add(spot); scene.add(spot.target);
  lights['frameSpot_' + wallDir] = spot;
  
  const artWorldPos = new THREE.Vector3();
  artMesh.getWorldPosition(artWorldPos);
  
  frameObjects.push({ group: frameGroup, artMesh, wallName: wallDir, viewPos, viewTarget });
  return frameGroup;
}

// ============================================================
let camTheta=Math.PI*0.12, camPhi=Math.PI*0.42, camRadius=7.5;
const camTarget=new THREE.Vector3(0,GRAPH_CENTER_Y,0);
let targetTheta=camTheta, targetPhi=camPhi, targetRadius=camRadius;
let autoOrbit=true, autoSpeed=0.0002, lastInteraction=0;
const AUTO_RESUME=5000;

// Art walk state
let artWalkActive = false;
let artWalkTarget = null; // { viewPos, viewTarget }
let savedCamState = null;
let artWalkProgress = 0;

function updateCamera() {
  if (artWalkActive && artWalkTarget) {
    // Smooth lerp toward art viewing position
    artWalkProgress = Math.min(artWalkProgress + 0.008, 1);
    const e = artWalkProgress * artWalkProgress * (3 - 2 * artWalkProgress); // smoothstep
    
    camera.position.lerp(artWalkTarget.viewPos, e * 0.02);
    
    // Smoothly transition lookAt
    const currentTarget = new THREE.Vector3();
    currentTarget.lerpVectors(camTarget, artWalkTarget.viewTarget, e);
    camera.lookAt(currentTarget);
    return;
  }
  
  if (savedCamState && !artWalkActive) {
    // Returning from art walk — lerp back
    artWalkProgress = Math.max(artWalkProgress - 0.008, 0);
    if (artWalkProgress > 0.01) {
      const e = artWalkProgress * artWalkProgress * (3 - 2 * artWalkProgress);
      // Let normal orbit resume gradually
    }
    if (artWalkProgress <= 0.01) {
      savedCamState = null;
      artWalkProgress = 0;
    }
  }
  
  camTheta += (targetTheta-camTheta)*0.045;
  camPhi += (targetPhi-camPhi)*0.045;
  camRadius += (targetRadius-camRadius)*0.045;
  camPhi = Math.max(0.08, Math.min(Math.PI-0.08, camPhi));
  camRadius = Math.max(2.2, Math.min(16, camRadius));
  
  camera.position.x = camTarget.x + camRadius*Math.sin(camPhi)*Math.sin(camTheta);
  camera.position.y = camTarget.y + camRadius*Math.cos(camPhi);
  camera.position.z = camTarget.z + camRadius*Math.sin(camPhi)*Math.cos(camTheta);
  camera.lookAt(camTarget);
}

// ============================================================
// INPUT
// ============================================================
let isDragging=false, prevX=0, prevY=0, pinchDist=0;
let holdTimer = null;
let isHolding = false;

container.addEventListener('pointerdown', e => {
  isDragging=true; prevX=e.clientX; prevY=e.clientY;
  lastInteraction=Date.now(); autoOrbit=false;
  touchHint.style.opacity='0';
  
  // Start hold detection for art walk
  const startX = e.clientX, startY = e.clientY;
  holdTimer = setTimeout(() => {
    // Check if still near start position (not dragging)
    if (Math.abs(prevX - startX) < 10 && Math.abs(prevY - startY) < 10) {
      // Raycast for art surfaces
      const r = container.getBoundingClientRect();
      const mx = ((e.clientX-r.left)/r.width)*2-1;
      const my = -((e.clientY-r.top)/r.height)*2+1;
      const rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(mx, my), camera);
      
      // Check all frame art surfaces
      const artSurfaces = [];
      frameObjects.forEach(f => {
        f.group.traverse(child => {
          if (child.userData.isArtSurface) artSurfaces.push(child);
        });
      });
      
      const hits = rc.intersectObjects(artSurfaces);
      if (hits.length > 0) {
        const wallName = hits[0].object.userData.wallName;
        const frameData = frameObjects.find(f => f.wallName === wallName);
        if (frameData) {
          startArtWalk(frameData);
        }
      }
    }
  }, 400); // 400ms hold to trigger
});

container.addEventListener('pointermove', e => {
  if (!isDragging) return;
  if (artWalkActive) return; // Don't orbit during art walk
  targetTheta -= (e.clientX-prevX)*0.005;
  targetPhi += (e.clientY-prevY)*0.005;
  prevX=e.clientX; prevY=e.clientY;
});

container.addEventListener('pointerup', () => {
  isDragging=false;
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (artWalkActive) endArtWalk();
});
container.addEventListener('pointerleave', () => {
  isDragging=false;
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (artWalkActive) endArtWalk();
});

function startArtWalk(frameData) {
  artWalkActive = true;
  isHolding = true;
  artWalkTarget = frameData;
  artWalkProgress = 0;
  savedCamState = { theta: camTheta, phi: camPhi, radius: camRadius };
  autoOrbit = false;
}

function endArtWalk() {
  artWalkActive = false;
  isHolding = false;
  artWalkTarget = null;
  // artWalkProgress will wind down in updateCamera
}

container.addEventListener('wheel', e => {
  e.preventDefault();
  if (artWalkActive) return;
  targetRadius += e.deltaY*0.006;
  lastInteraction=Date.now(); autoOrbit=false;
}, { passive: false });

container.addEventListener('touchstart', e => {
  if (e.touches.length===2) {
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchDist=Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: true });
container.addEventListener('touchmove', e => {
  if (e.touches.length===2) {
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    targetRadius += (pinchDist-dist)*0.018;
    pinchDist=dist;
    lastInteraction=Date.now(); autoOrbit=false;
  }
}, { passive: true });

// Raycasting for dots
const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
let pStart={x:0,y:0};
container.addEventListener('pointerdown', e => { pStart.x=e.clientX; pStart.y=e.clientY; });
container.addEventListener('pointerup', e => {
  if (artWalkActive) return;
  if (Math.abs(e.clientX-pStart.x)<6 && Math.abs(e.clientY-pStart.y)<6) {
    const r=container.getBoundingClientRect();
    mouse.x=((e.clientX-r.left)/r.width)*2-1;
    mouse.y=-((e.clientY-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(clickableObjects);
    if (hits.length>0) {
      const obj=hits[0].object;
      showInfoCard(obj.userData.label,obj.userData.desc);
      obj.scale.set(1.5,1.5,1.5);
      setTimeout(()=>obj.scale.set(1,1,1),350);
    } else closeInfoCard();
  }
});

function showInfoCard(t,b) {
  document.getElementById('info-title').textContent=t;
  document.getElementById('info-body').textContent=b;
  infoCard.classList.add('visible');
}
function closeInfoCard() { infoCard.classList.remove('visible'); }

// ============================================================
// MODE TOGGLE — celestial
// ============================================================
let modeTransition=null;

function toggleMode() {
  isDarkMode=!isDarkMode;
  document.body.classList.toggle('light',!isDarkMode);
  document.getElementById('mode-toggle').textContent=isDarkMode?'Skylight':'Gallery';
  
  if (modeTransition) cancelAnimationFrame(modeTransition);
  const dark=isDarkMode;
  
  const T = {
    // Celestial
    starOp: dark?0.9:0, moonOp: dark?0.95:0, moonGlowOp: dark?(0.12+illum*0.15):0,
    moonBeamI: dark?(0.25+illum*0.4):0,
    sunOp: dark?0:0.85, sunGlowOp: dark?0:0.2,
    sunBeamI: dark?0:1.6, shaftOp: dark?0:0.015,
    // Walls translucency
    wallOp: dark?0.55:0.80,
    wallColor: dark?new THREE.Color(wallDarkColor):new THREE.Color(wallLightColor),
    // Gallery
    spotMainI: dark?1.6:0.4, w1I: dark?0.55:0.15, w2I: dark?0.4:0.1,
    ambI: dark?0.6:1.4, exp: dark?0.9:1.5,
    fogColor: dark?new THREE.Color(0x0c0b09):new THREE.Color(0xe8e4dc),
    bgColor: dark?new THREE.Color(0x0c0b09):new THREE.Color(0xe8e4dc),
    floorColor: dark?new THREE.Color(0x12110e):new THREE.Color(0xc8c2b8),
    ceilColor: dark?new THREE.Color(0x0a0908):new THREE.Color(0xf0ece4),
    fogNear: dark?10:14, fogFar: dark?35:50,
  };
  
  let p=0;
  function step() {
    p++;
    const t=Math.min(p/120,1), e=t*t*(3-2*t);
    const r = 0.035; // lerp rate
    
    starMaterial.opacity+=(T.starOp-starMaterial.opacity)*r;
    moonMat.opacity+=(T.moonOp-moonMat.opacity)*r;
    moonGlowMat.opacity+=(T.moonGlowOp-moonGlowMat.opacity)*r;
    lights.moonBeam.intensity+=(T.moonBeamI-lights.moonBeam.intensity)*r;
    sunMat.opacity+=(T.sunOp-sunMat.opacity)*r;
    sunGlowMat.opacity+=(T.sunGlowOp-sunGlowMat.opacity)*r;
    lights.sunBeam.intensity+=(T.sunBeamI-lights.sunBeam.intensity)*r;
    shaftMat.opacity+=(T.shaftOp-shaftMat.opacity)*r;
    
    walls.forEach(w => {
      w.material.opacity+=(T.wallOp-w.material.opacity)*r;
      w.material.color.lerp(T.wallColor,r);
    });
    
    lights.spotMain.intensity+=(T.spotMainI-lights.spotMain.intensity)*r;
    lights.spotWarm1.intensity+=(T.w1I-lights.spotWarm1.intensity)*r;
    lights.spotWarm2.intensity+=(T.w2I-lights.spotWarm2.intensity)*r;
    lights.ambient.intensity+=(T.ambI-lights.ambient.intensity)*r;
    renderer.toneMappingExposure+=(T.exp-renderer.toneMappingExposure)*r;
    
    scene.fog.color.lerp(T.fogColor,r);
    scene.background.lerp(T.bgColor,r);
    scene.fog.near+=(T.fogNear-scene.fog.near)*r;
    scene.fog.far+=(T.fogFar-scene.fog.far)*r;
    floor.material.color.lerp(T.floorColor,r);
    
    ceilPanels.forEach(c => c.material.color.lerp(T.ceilColor,r));
    scene.traverse(obj => {
      if (obj.userData.isColumn&&obj.material) {
        obj.material.color.lerp(dark?new THREE.Color(0x1a1814):new THREE.Color(0xb8b0a4),r);
      }
    });
    
    Object.keys(lights).forEach(k => {
      if (k.startsWith('frameSpot_')) lights[k].intensity+=((dark?0.5:0.15)-lights[k].intensity)*r;
    });
    // Tree light — brighter in daylight
    if (lights.treeLight) lights.treeLight.intensity+=((dark?0.4:1.0)-lights.treeLight.intensity)*r;
    if (lights.giraffeLight) lights.giraffeLight.intensity+=((dark?0.4:0.9)-lights.giraffeLight.intensity)*r;
    if (lights.elephantLight) lights.elephantLight.intensity+=((dark?0.4:0.9)-lights.elephantLight.intensity)*r;
    
    if (t<1) modeTransition=requestAnimationFrame(step);
    else modeTransition=null;
  }
  step();
}

// ============================================================
// ANIMATION
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  
  if (!autoOrbit && !artWalkActive && Date.now()-lastInteraction>AUTO_RESUME && !isDragging) autoOrbit=true;
  if (autoOrbit && !artWalkActive) {
    targetTheta+=autoSpeed;
    targetPhi=Math.PI*0.42+Math.sin(t*0.1)*0.06;
  }
  updateCamera();
  
  // Dots
  allDots.forEach((dot,i) => {
    dot.position.y=dot.userData.basePos.y+Math.sin(t*0.4+i*1.1)*0.015;
    const c=allConnectors[i];
    const pos=c.line.geometry.attributes.position;
    pos.setXYZ(1,dot.position.x,dot.position.y,dot.position.z);
    pos.needsUpdate=true;
  });
  
  // Pin
  const ps=1+Math.sin(t*1.5)*0.03;
  userPin.scale.set(ps,ps,ps);
  
  // Star twinkle
  if (starMaterial.opacity>0.01) {
    const sizes=stars.geometry.attributes.size;
    for (let i=0;i<starCount;i++) {
      sizes.array[i]=(0.3+Math.random()*0.8)*(0.5+Math.sin(t*1.5+i*5.7)*0.5);
    }
    sizes.needsUpdate=true;
  }
  
  // Moon gentle drift
  moonDisc.position.y = 20 + Math.sin(t*0.05)*0.5;
  moonGlow.position.copy(moonDisc.position);
  
  // Sun gentle position
  if (sunMat.opacity > 0.01) {
    sunDisc.position.x = 2 + Math.sin(t*0.03)*0.3;
    sunGlow.position.copy(sunDisc.position);
  }
  
  // Light shaft sway
  if (shaftMat.opacity>0.001) {
    lightShaft.rotation.y=Math.sin(t*0.25)*0.015;
  }
  
  // Animal idle — gentle breathing/swaying
  elephant.position.y = Math.sin(t*0.3)*0.04;
  elephant.rotation.y = Math.PI*0.15 + Math.sin(t*0.15)*0.03;
  giraffe.position.y = Math.sin(t*0.25+1)*0.03;
  giraffe.rotation.y = -Math.PI*0.6 + Math.sin(t*0.12+2)*0.02;
  zebra.position.y = Math.sin(t*0.35+2)*0.03;
  zebra.rotation.y = Math.PI*0.8 + Math.sin(t*0.18+1)*0.025;
  
  renderer.render(scene,camera);
}

function onResize() {
  const w=container.clientWidth, h=container.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',onResize);

document.querySelectorAll('.lower-nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lower-nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

updateCamera();
animate();
</script>
